<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header wrapper">
        <div class="header__logo">
            <h1 class="header__title">Портфолио</h1>
        </div>
        <nav class="header__nav">
            <button class="header__button">Главная</button>
            <button class="header__button">О себе</button>
            <button class="header__button">Проекты</button>
            <button class="header__button">Навыки</button>
            <button class="header__button">Контакты</button>
        </nav>
    </header>
    <main class="main wrapper">
        <div class="main__hero">
            <div class="main__title">
              <h1 class="main__title-text">Привет, я <span class="main__title-span">Разработчик</span></h1>
              <p class="main__text">Создаю современные и функциональные веб-приложения с фокусом на пользовательский опыт</p>
             <div class="main__btn">
                 <button class="main__button-blue">Мoи проекты</button>
                 <button class="main__button-white">Связаться</button>
             </div>
             <div class="main__social>
                <a href="https://github.com/gulkinasvetlana95/project1/tree/main/companent" class="main__href">
                    <img src="media/github.jpg" alt="GitHub" class="main__social-icon">
                </a>
                <a href="https://www.linkedin.com/in/svetlana-pavlishchuk-98204a38b/" class="main__social">
                    <img src="media/linkedin-logo.png" alt="LinkedIn" class="main__social-icon">
                </a>
                <a href="https://mail.google.com/mail/u/0/#inbox/FMfcgzQcpdrwXPDqrhdZjZKgrhgWBHQc" class="main__social">
                    <img src="media/email-png.png" alt="Email" class="main__social-icon">
                </a>
             </div>
           </div>
        </div>
    </main>
    
</body>

</html>
